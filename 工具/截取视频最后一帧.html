<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频最后一帧截图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #4361ee;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #4361ee;
            background: #e8edff;
        }
        input[type="file"] {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        video {
            display: block;
            max-width: 100%;
            max-height: 400px;
            margin: 20px auto;
            border-radius: 8px;
            background: #000;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #4361ee;
            color: #fff;
        }
        .btn-primary:hover {
            background: #3451d1;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        .btn-secondary:hover {
            background: #dee2e6;
        }
        .btn-download {
            background: #2ec4b6;
            color: #fff;
        }
        .btn-download:hover {
            background: #26a69a;
        }
        .preview-area {
            display: none;
            text-align: center;
        }
        .preview-area.active {
            display: block;
        }
        #previewCanvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            border: 2px solid #eee;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #d4edda;
            color: #155724;
            text-align: center;
            display: none;
        }
        .status.active {
            display: block;
        }
        .info {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 视频最后一帧截图</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传视频文件</div>
            <div class="upload-text" style="font-size: 13px; margin-top: 10px;">支持 MP4, WebM, MOV 等格式</div>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="preview-area" id="previewArea">
            <video id="videoPlayer" controls></video>
            <div class="btn-group">
                <button class="btn-secondary" onclick="resetUpload()">重新上传</button>
                <button class="btn-primary" id="captureBtn" onclick="captureLastFrame()">截取最后一帧</button>
            </div>
            <canvas id="previewCanvas" style="display:none;"></canvas>
            <div class="status" id="statusMsg"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const previewArea = document.getElementById('previewArea');
        const previewCanvas = document.getElementById('previewCanvas');
        const captureBtn = document.getElementById('captureBtn');
        const statusMsg = document.getElementById('statusMsg');

        uploadArea.addEventListener('click', () => videoInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                loadVideo(file);
            }
        });

        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadVideo(file);
        });

        function loadVideo(file) {
            const url = URL.createObjectURL(file);
            videoPlayer.src = url;
            previewArea.classList.add('active');
            uploadArea.style.display = 'none';
            captureBtn.disabled = false;
            statusMsg.classList.remove('active');
            previewCanvas.style.display = 'none';
        }

        function captureLastFrame() {
            videoPlayer.currentTime = videoPlayer.duration - 0.1;
        }

        videoPlayer.addEventListener('seeked', () => {
            const canvas = previewCanvas;
            const ctx = canvas.getContext('2d');
            canvas.width = videoPlayer.videoWidth;
            canvas.height = videoPlayer.videoHeight;
            ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
            
            previewCanvas.style.display = 'block';
            captureBtn.textContent = '已截图，点击下载';
            captureBtn.classList.remove('btn-primary');
            captureBtn.classList.add('btn-download');
            captureBtn.onclick = downloadImage;
            
            statusMsg.textContent = '截图成功！点击按钮下载图片';
            statusMsg.classList.add('active');
        });

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'video-last-frame.png';
            link.href = previewCanvas.toDataURL('image/png');
            link.click();
            
            statusMsg.textContent = '图片已下载！';
        }

        function resetUpload() {
            videoPlayer.src = '';
            videoInput.value = '';
            previewArea.classList.remove('active');
            uploadArea.style.display = 'block';
            previewCanvas.style.display = 'none';
            statusMsg.classList.remove('active');
            captureBtn.textContent = '截取最后一帧';
            captureBtn.classList.remove('btn-download');
            captureBtn.classList.add('btn-primary');
            captureBtn.onclick = captureLastFrame;
        }
    </script>
</body>
</html>
